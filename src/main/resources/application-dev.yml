spring:
  application:
    name: AdoTEC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  app:
    jwtSecret: ${JWT_SECRET}
    jwtExpirationMs: ${JWT_EXPIRATION_MS}
    jwtCookieName: ${JWT_COOKIE_NAME}

logging:
  level:
    org.springframework.security: DEBUG

# ── Actuator ──────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# ── Rate Limit (Login) ───────────────────────────────────
rate-limit:
  login:
    enabled: true
    capacity: 5
    refill-tokens: 5
    refill-duration: 60

# Cloudinary Configuration
cloudinary:
  cloud-name: 
  api-key: 
  api-secret: 
